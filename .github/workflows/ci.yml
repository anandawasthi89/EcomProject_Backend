name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B test

  package:
    name: Package Jar
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Package application
        run: ./mvnw -B -DskipTests clean package

      #Skip artifact upload in act
      - name: Upload jar artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: |
            target/*.jar
            !target/*.original

      #Debug fallback for act
      - name: Verify jar exists (act fallback)
        if: ${{ env.ACT }}
        run: ls -lh target/

  profile-smoke:
    name: Smoke Test (${{ matrix.profile }})
    runs-on: ubuntu-latest
    needs: package

    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: dev
            db_name: ecommerce_dev
            db_var_prefix: DEV
            db_host_port: 5432
            app_port: 9005
          - profile: prod
            db_name: ecommerce_prod
            db_var_prefix: PROD
            db_host_port: 5433
            app_port: 9006

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ matrix.db_name }}
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - ${{ matrix.db_host_port }}:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ${{ matrix.db_name }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #Required for act fallback build
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      #Use artifact only in real GitHub
      - name: Download jar artifact
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      #Rebuild jar locally (act)
      - name: Rebuild jar (act fallback)
        if: ${{ env.ACT }}
        run: ./mvnw -B -DskipTests clean package

      - name: Set smoke-test environment
        run: |
          {
            echo "SPRING_PROFILES_ACTIVE=${{ matrix.profile }}"
            echo "SERVER_PORT=${{ matrix.app_port }}"
            echo "JWT_EXPIRATION_MS=36000000"
            echo "PASSWORD_HASH_STRENGTH=12"
            echo "${{ matrix.db_var_prefix }}_DB_URL=jdbc:postgresql://127.0.0.1:${{ matrix.db_host_port }}/${{ matrix.db_name }}"
            echo "${{ matrix.db_var_prefix }}_DB_USERNAME=postgres"
            echo "${{ matrix.db_var_prefix }}_DB_PASSWORD=postgres"
            echo "${{ matrix.db_var_prefix }}_HIBERNATE_DDL_AUTO=update"
            echo "${{ matrix.db_var_prefix }}_CORS_ALLOWED_ORIGINS=http://localhost:4200"
            echo "${{ matrix.db_var_prefix }}_JWT_SECRET=ZGV2LXNlY3JldC1mb3ItbG9jYWwtb25seS1yZXBsYWNlLWJlZm9yZS1wcm9k"
          } >> "$GITHUB_ENV"

      - name: Start application and verify health
        run: |
          APP_JAR=$(find target -maxdepth 1 -type f -name '*.jar' ! -name '*.original' | head -n 1)
          if [ -z "$APP_JAR" ]; then
            echo "No runnable jar found in target/"
            ls -la target || true
            exit 1
          fi

          nohup java -jar "$APP_JAR" >/tmp/app.log 2>&1 </dev/null &
          APP_PID=$!

          cleanup() {
            kill "$APP_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for i in $(seq 1 30); do
            if ! ps -p "$APP_PID" -o stat= 2>/dev/null | grep -vq Z; then
              echo "Application process exited early"
              cat /tmp/app.log || true
              exit 1
            fi
            if curl --fail --silent "http://127.0.0.1:${{ matrix.app_port }}/" > /tmp/health.json; then
              grep '"status"' /tmp/health.json
              grep '"ok"' /tmp/health.json
              exit 0
            fi
            sleep 2
          done

          echo "Application failed to start"
          cat /tmp/app.log || true
          exit 1

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ecom-backend:${{ github.sha }} .
